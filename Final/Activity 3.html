<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>

    <link rel="stylesheet" href="pagination.css">

    <style>
        .uber-btn {
            background-color: black;
            padding: 10px 20px;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
        .uber-btn:hover {
            background-color: black;
            padding: 10px 20px;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            opacity: 80%;
        }

        .amazon-btn {
            background-color: rgb(255, 216, 20);
            border-radius: 20px;
            color: black;
            border: none;
            padding: 10px 55px;
            font-family: helvetica;
        }
        .amazon-btn:hover {
            background-color: rgb(242, 197, 15);
            border-radius: 20px;
            color: black;
            border: none;
            padding: 10px 55px;
            font-family: helvetica;
        }

        .git-btn {
            background-color: rgb(46, 164, 79);
            border-radius: 6px;
            padding: 9px 20px 10.5px;
            color: white;
            font-family: arial;
            font-weight: bold;
            border: none;
        }
         .git-btn:hover {
            background-color: rgb(46, 164, 79);
            border-radius: 6px;
            padding: 9px 20px 10.5px;
            color: white;
            font-family: arial;
            font-weight: bold;
            border: none;
            box-shadow: 0px 5px 10px 0px rgb(108, 117, 125, 0.6);
        }

        .boot-start-btn {
            background-color: rgb(121, 82, 179);
            border-radius: 4px;
            padding: 10px 20px;
            border: none;
            color: white;
        }
         .boot-start-btn:hover {
            background-color: rgb(93, 58, 146);
            border-radius: 4px;
            padding: 10px 20px;
            border: none;
            color: white;
        }

        .boot-dl-btn {
            background-color: white;
            color: rgb(108, 117, 125);
            border-color: rgb(108, 117, 125);
            border-width: 1px;
            border-radius: 4px;
            padding: 10px 20px;
        }
        .boot-dl-btn:hover {
            background-color: rgb(108, 117, 125);
            color: white;
            border-color: rgb(108, 117, 125);
            border-width: 1px;
            border-radius: 4px;
            padding: 10px 20px;
        }

        .link-apply-btn {
            background-color: rgb(10, 102, 194);
            border-radius: 20px;
            border: none;
            padding: 10px 20px;
            color: white;
            font-weight: bold;
        }
        .link-apply-btn:hover {
            background-color: rgb(7, 78, 150);
            border-radius: 20px;
            border: none;
            padding: 10px 20px;
            color: white;
            font-weight: bold;
        }

        .link-save-btn {
            color: rgb(10, 102, 194);
            background-color: white;
            border-radius: 20px;
            border-color: rgb(10, 102, 194);
            padding: 10px 20px;
            font-weight: bold;
            border-width: 1px;
        }
        .link-save-btn:hover {
            color: rgb(10, 102, 194);
            background-color: rgb(10, 102, 194, 0.2);
            border-radius: 20px;
            border-color: rgb(10, 102, 194);
            padding: 10px 20px;
            font-weight: bold;
            border-width: 2px;
        }
    </style>

</head>
<body> <center>
     <button class="uber-btn">
        Request now
    </button>
        <br><br><br>
    <button class="amazon-btn">
        Add to Cart
    </button>
        <br><br><br>
    <button class="git-btn">
        Sign up
    </button>
    <br> <br> <br>
    <button class="boot-start-btn">
        <b> Get started
    </button>

    <button class="boot-dl-btn">
        <b>Download </b>
    </button>
        <br><br><br>
    <button class="link-apply-btn">
        Apply on company website
    </button>

    <button class="link-save-btn">
        Save
    </button>

    <a href="Activity 2.html">3</a>
    <a href="Activity 3.html" class="active">4</a>
  </div>
</center>

</body>
</html>
